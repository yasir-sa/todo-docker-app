services:
  # 1. டேட்டாபேஸ் சர்வீஸை சேர்க்கவும்
  db:
    image: postgres:15
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data

  # 2. கிளையண்ட் மற்றும் சர்வர்
  client:
    build: ./client
    ports:
      - "5173:5173"
    volumes:
      - ./client:/app
      - /app/node_modules
    stdin_open: true
    tty: true

  server:
    build: ./server
    ports:
      - "5000:5000"
    volumes:
      - ./server:/app
      - /app/node_modules
    environment:
      - DB_USER=${DB_USER}
      - DB_HOST=db        # <--- மிக முக்கியம்: இங்கே 'db' என்று இருக்க வேண்டும்
      - DB_NAME=${DB_NAME}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_PORT=5432      # <--- இங்கே 5432 என்று உறுதி செய்யவும்
    depends_on:
      - db                # சர்வர் டேட்டாபேஸுக்குப் பிறகுதான் ஸ்டார்ட் ஆகும்

# 3. வால்யூம் (Volume) வரையறை
volumes:
  db_data: