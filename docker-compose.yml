version: '3.8'

services:
  # 1. டேட்டாபேஸ் சர்வீஸ்
  db:
    image: postgres:15
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data

  # 2. கிளையண்ட் சர்வீஸ்
  client:
    build: ./client
    ports:
      - "5173:5173"
    volumes:
      - ./client:/app
      - /app/node_modules
    stdin_open: true
    tty: true

  # 3. சர்வர் சர்வீஸ் (இப்போது DB_URL-ஐப் பயன்படுத்துகிறது)
  server:
    build: ./server
    ports:
      - "5000:5000"
    volumes:
      - ./server:/app
      - /app/node_modules
    environment:
      # இங்கே DB_URL-ஐ டாக்கர் நெட்வொர்க்கிற்கு ஏற்றவாறு உருவாக்கியுள்ளோம்
      DB_URL: postgresql://${DB_USER}:${DB_PASSWORD}@db:5432/${DB_NAME}
    depends_on:
      - db

# 4. வால்யூம் வரையறை
volumes:
  db_data: